<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 712">
  <defs>
    <marker id="a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#555"/>
    </marker>
    <marker id="ad" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#666"/>
    </marker>
    <marker id="ar" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#ef4444"/>
    </marker>
    <marker id="ag" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#238636"/>
    </marker>
    <marker id="ao" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#f97316"/>
    </marker>
  </defs>

  <rect width="560" height="712" rx="8" fill="#0d1117"/>
  <rect x="1" y="1" width="558" height="710" rx="7" fill="none" stroke="#21262d" stroke-width="1"/>

  <!-- Goal -->
  <rect x="155" y="18" width="150" height="36" rx="18" fill="#21262d" stroke="#30363d" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="230" y="41" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="13" fill="#c9d1d9" text-anchor="middle" font-weight="500">Goal</text>
  <line x1="230" y1="54" x2="230" y2="72" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Orchestrator -->
  <rect x="145" y="72" width="170" height="42" rx="6" fill="#f59e0b" stroke="#d97706" stroke-width="1"/>
  <text x="230" y="98" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="14" fill="#000" text-anchor="middle" font-weight="700">Orchestrator</text>

  <line x1="230" y1="114" x2="230" y2="150" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="238" y="137" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="8" fill="#6e7681" text-anchor="start">new project / reprioritize</text>

  <!-- Product Manager -->
  <rect x="145" y="150" width="170" height="36" rx="6" fill="#8b5cf6" stroke="#7c3aed" stroke-width="1"/>
  <text x="230" y="170" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="12" fill="#fff" text-anchor="middle" font-weight="600">Product Manager</text>
  <text x="230" y="181" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="8" fill="#ddd6fe" text-anchor="middle">milestone roadmap</text>

  <line x1="230" y1="186" x2="230" y2="222" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="238" y="209" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="8" fill="#6e7681" text-anchor="start">needs spec</text>

  <!-- Planner -->
  <rect x="145" y="222" width="170" height="36" rx="6" fill="#3b82f6" stroke="#2563eb" stroke-width="1"/>
  <text x="230" y="245" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="12" fill="#fff" text-anchor="middle" font-weight="600">Planner</text>

  <!-- delegate to design agents -->
  <text x="350" y="186" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="8" fill="#6e7681" text-anchor="middle">design sections</text>
  <path d="M315,232 L360,210" fill="none" stroke="#666" stroke-width="1.3" stroke-dasharray="4,3" marker-end="url(#ad)"/>
  <path d="M315,240 L360,242" fill="none" stroke="#666" stroke-width="1.3" stroke-dasharray="4,3" marker-end="url(#ad)"/>
  <path d="M315,248 L360,276" fill="none" stroke="#666" stroke-width="1.3" stroke-dasharray="4,3" marker-end="url(#ad)"/>

  <!-- Game Designer -->
  <rect x="360" y="196" width="180" height="30" rx="5" fill="#ec4899" stroke="#db2777" stroke-width="1"/>
  <text x="450" y="209" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="11" fill="#fff" text-anchor="middle" font-weight="600">Game Designer</text>
  <text x="450" y="220" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="7.5" fill="#fbcfe8" text-anchor="middle">docs/GAME.md</text>

  <!-- Art Director -->
  <rect x="360" y="228" width="180" height="30" rx="5" fill="#14b8a6" stroke="#0d9488" stroke-width="1"/>
  <text x="450" y="241" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="11" fill="#fff" text-anchor="middle" font-weight="600">Art Director</text>
  <text x="450" y="252" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="7.5" fill="#99f6e4" text-anchor="middle">DESIGN.md &#183; docs/AUDIO.md</text>

  <!-- Narrative Designer (on-demand) -->
  <rect x="360" y="260" width="180" height="30" rx="5" fill="#161b22" stroke="#eab308" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="450" y="273" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="11" fill="#eab308" text-anchor="middle" font-weight="600">Narrative Designer</text>
  <text x="450" y="284" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="7.5" fill="#a16207" text-anchor="middle" font-style="italic">on-demand &#183; docs/NARRATIVE.md</text>

  <line x1="230" y1="258" x2="230" y2="300" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="238" y="282" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="8" fill="#6e7681" text-anchor="start">spec ready</text>

  <!-- Coder -->
  <rect x="145" y="300" width="170" height="36" rx="6" fill="#10b981" stroke="#059669" stroke-width="1"/>
  <text x="230" y="323" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="12" fill="#fff" text-anchor="middle" font-weight="600">Coder</text>

  <line x1="230" y1="336" x2="230" y2="372" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="238" y="358" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="8" fill="#6e7681" text-anchor="start">code complete</text>

  <!-- Reviewer -->
  <rect x="145" y="372" width="170" height="36" rx="6" fill="#ef4444" stroke="#dc2626" stroke-width="1"/>
  <text x="230" y="395" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="12" fill="#fff" text-anchor="middle" font-weight="600">Reviewer</text>

  <!-- reviewer detail: 2 parallel + consolidation -->
  <rect x="370" y="358" width="170" height="17" rx="3" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="455" y="370" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="8" fill="#8b949e" text-anchor="middle">opposite-provider SOTA</text>
  <rect x="370" y="378" width="170" height="17" rx="3" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="455" y="390" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="8" fill="#8b949e" text-anchor="middle">current model</text>
  <rect x="370" y="398" width="170" height="17" rx="3" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="455" y="410" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="8" fill="#8b949e" text-anchor="middle">consolidation</text>
  <text x="455" y="427" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="8" fill="#484f58" text-anchor="middle">balance changes reviewed too &#183; high reasoning</text>
  <line x1="315" y1="384" x2="370" y2="366" stroke="#444" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="315" y1="390" x2="370" y2="386" stroke="#444" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="315" y1="396" x2="370" y2="406" stroke="#444" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- reviewer -> coder feedback -->
  <path d="M145,390 L108,390 L108,318 L145,318" fill="none" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#ar)"/>
  <text x="100" y="356" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="8" fill="#f87171" text-anchor="middle" font-style="italic" transform="rotate(-90,100,356)">fix issues</text>

  <line x1="230" y1="408" x2="230" y2="444" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="238" y="430" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="8" fill="#6e7681" text-anchor="start">review passed</text>

  <!-- Run Target gate -->
  <rect x="150" y="444" width="160" height="34" rx="17" fill="#161b22" stroke="#58a6ff" stroke-width="1.3"/>
  <text x="230" y="461" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="11" fill="#58a6ff" text-anchor="middle" font-weight="600">Run Target check</text>
  <text x="230" y="472" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="7.5" fill="#388bfd" text-anchor="middle">build runs &#183; smoke check passes</text>

  <!-- gate fail -> coder -->
  <path d="M150,461 L88,461 L88,318 L145,318" fill="none" stroke="#ef4444" stroke-width="1.3" stroke-dasharray="5,3" marker-end="url(#ar)"/>
  <text x="80" y="392" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="8" fill="#f87171" text-anchor="middle" font-style="italic" transform="rotate(-90,80,392)">no build</text>

  <line x1="230" y1="478" x2="230" y2="514" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="238" y="500" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="8" fill="#6e7681" text-anchor="start">runnable build</text>

  <!-- Playtester -->
  <rect x="145" y="514" width="170" height="36" rx="6" fill="#06b6d4" stroke="#0891b2" stroke-width="1"/>
  <text x="230" y="534" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="12" fill="#fff" text-anchor="middle" font-weight="600">Playtester</text>
  <text x="230" y="545" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="8" fill="#a5f3fc" text-anchor="middle">soft-locks &#183; exploits &#183; balance &#183; perf</text>

  <!-- playtester -> coder feedback -->
  <path d="M145,532 L68,532 L68,318 L145,318" fill="none" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#ar)"/>
  <text x="60" y="430" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="8" fill="#f87171" text-anchor="middle" font-style="italic" transform="rotate(-90,60,430)">issues by suggested owner</text>

  <line x1="230" y1="550" x2="230" y2="586" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="238" y="572" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="8" fill="#6e7681" text-anchor="start">all passed</text>

  <!-- Commit -->
  <rect x="155" y="586" width="150" height="36" rx="18" fill="#21262d" stroke="#30363d" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="230" y="609" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="13" fill="#c9d1d9" text-anchor="middle" font-weight="500">Commit</text>

  <!-- loop back to orchestrator -->
  <path d="M155,604 L40,604 L40,93 L145,93" fill="none" stroke="#555" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#a)"/>
  <text x="32" y="350" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="9" fill="#6e7681" text-anchor="middle" font-style="italic" transform="rotate(-90,32,350)">goal incomplete: next feature</text>

  <line x1="230" y1="622" x2="230" y2="650" stroke="#238636" stroke-width="1.5" marker-end="url(#ag)"/>
  <text x="238" y="642" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="8" fill="#3fb950" text-anchor="start">goal complete</text>

  <!-- Goal Achieved -->
  <rect x="145" y="650" width="170" height="36" rx="18" fill="#21262d" stroke="#238636" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="230" y="673" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="13" fill="#3fb950" text-anchor="middle" font-weight="600">Goal Achieved</text>

  <text x="280" y="702" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="9" fill="#484f58" text-anchor="middle" font-style="italic">Each agent hands back to the Orchestrator, who decides the next step.</text>

  <!-- Marketer (on-demand) -->
  <rect x="370" y="90" width="170" height="40" rx="6" fill="#f97316" stroke="#ea580c" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="455" y="110" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="12" fill="#fff" text-anchor="middle" font-weight="600">Marketer</text>
  <text x="455" y="122" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="8" fill="#fed7aa" text-anchor="middle" font-style="italic">mostly on-demand &#183; Steam / devlog</text>

  <path d="M315,93 L370,105" fill="none" stroke="#f97316" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#ao)"/>
  <text x="343" y="86" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="8" fill="#fdba74" text-anchor="middle">inception / MVP</text>

</svg>
