<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 330" role="img" aria-labelledby="title desc">
  <title id="title">A-Team Lite workflow</title>
  <desc id="desc">A request flows through an optional roadmap gate, plan mode, a cross-model rubber duck critique, implementation, QA, and completion. Code and security review are optional escalations.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-30%" width="140%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000" flood-opacity=".28"/>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0 0 8 4 0 8Z" fill="#6e7681"/>
    </marker>
    <style>
      .label { font: 700 15px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #f0f6fc; }
      .small { font: 500 11px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #8b949e; }
      .step { filter: url(#shadow); stroke-width: 1.5; }
      .flow { stroke: #6e7681; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="920" height="330" rx="18" fill="url(#bg)"/>
  <rect x="1" y="1" width="918" height="328" rx="17" fill="none" stroke="#30363d"/>

  <text x="42" y="42" class="small" letter-spacing="2">A-TEAM LITE / ONE OWNER, SKILLS ON DEMAND</text>

  <rect class="step" x="35" y="105" width="110" height="66" rx="12" fill="#21262d" stroke="#484f58"/>
  <text x="90" y="134" class="label" text-anchor="middle">Request</text>
  <text x="90" y="154" class="small" text-anchor="middle">classify scope</text>

  <path class="flow" d="M145 138H180"/>

  <rect class="step" x="180" y="90" width="125" height="96" rx="12" fill="#3d2b0b" stroke="#f59e0b"/>
  <text x="242.5" y="126" class="label" text-anchor="middle">Roadmap</text>
  <text x="242.5" y="147" class="small" text-anchor="middle">new features only</text>
  <text x="242.5" y="166" class="small" text-anchor="middle">fixes bypass</text>

  <path class="flow" d="M305 138H340"/>

  <rect class="step" x="340" y="105" width="110" height="66" rx="12" fill="#102a43" stroke="#3b82f6"/>
  <text x="395" y="134" class="label" text-anchor="middle">Plan</text>
  <text x="395" y="154" class="small" text-anchor="middle">/plan</text>

  <path class="flow" d="M450 138H485"/>

  <rect class="step" x="485" y="83" width="145" height="110" rx="12" fill="#351a3f" stroke="#d946ef"/>
  <text x="557.5" y="119" class="label" text-anchor="middle">Rubber duck</text>
  <text x="557.5" y="142" class="small" text-anchor="middle">opposite provider</text>
  <text x="557.5" y="161" class="small" text-anchor="middle">one critique</text>
  <text x="557.5" y="180" class="small" text-anchor="middle">non-trivial plans</text>

  <path class="flow" d="M630 138H665"/>

  <rect class="step" x="665" y="105" width="110" height="66" rx="12" fill="#0c2d25" stroke="#10b981"/>
  <text x="720" y="134" class="label" text-anchor="middle">Build</text>
  <text x="720" y="154" class="small" text-anchor="middle">main session</text>

  <path class="flow" d="M775 138H810"/>

  <rect class="step" x="810" y="105" width="75" height="66" rx="12" fill="#082f49" stroke="#06b6d4"/>
  <text x="847.5" y="134" class="label" text-anchor="middle">QA</text>
  <text x="847.5" y="154" class="small" text-anchor="middle">execute</text>

  <path class="flow" d="M847 171V226H720"/>
  <rect class="step" x="555" y="218" width="165" height="66" rx="12" fill="#211a38" stroke="#8b5cf6"/>
  <text x="637.5" y="247" class="label" text-anchor="middle">Finish</text>
  <text x="637.5" y="267" class="small" text-anchor="middle">docs · memory · commit</text>

  <path d="M810 171C795 230 782 251 720 251" stroke="#f97316" stroke-width="1.5" stroke-dasharray="5 4" fill="none" marker-end="url(#arrow)"/>
  <text x="795" y="232" class="small" fill="#fdba74" text-anchor="end">optional /review</text>
  <text x="795" y="249" class="small" fill="#fdba74" text-anchor="end">or /security-review</text>

  <path d="M242 90V67H90V105" stroke="#6e7681" stroke-width="1.5" stroke-dasharray="5 4" fill="none" marker-end="url(#arrow)"/>
  <text x="164" y="62" class="small" text-anchor="middle">bug fix / maintenance</text>
</svg>
