<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" role="img" aria-labelledby="title desc">
  <title id="title">A-Team Lite</title>
  <desc id="desc">A dark terminal-inspired banner showing a skill-first workflow with one owner and on-demand capabilities.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0f14"/>
      <stop offset=".55" stop-color="#101923"/>
      <stop offset="1" stop-color="#0a1119"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f59e0b"/>
      <stop offset=".45" stop-color="#f97316"/>
      <stop offset="1" stop-color="#d946ef"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-80%" width="180%" height="260%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#263241" stroke-opacity=".38"/>
    </pattern>
    <style>
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      .title { font-size: 78px; font-weight: 800; letter-spacing: 8px; fill: #f0f6fc; }
      .sub { font-size: 21px; font-weight: 600; letter-spacing: 3px; fill: #9ca3af; }
      .flow { font-size: 18px; font-weight: 700; fill: #d1d5db; }
      .prompt { font-size: 18px; font-weight: 700; fill: #34d399; }
    </style>
  </defs>

  <rect width="1200" height="400" rx="24" fill="url(#background)"/>
  <rect width="1200" height="400" rx="24" fill="url(#grid)"/>
  <rect x="1" y="1" width="1198" height="398" rx="23" fill="none" stroke="#303b49" stroke-width="2"/>

  <circle cx="65" cy="50" r="8" fill="#ef4444"/>
  <circle cx="91" cy="50" r="8" fill="#f59e0b"/>
  <circle cx="117" cy="50" r="8" fill="#22c55e"/>
  <text x="160" y="57" class="mono sub" font-size="16">copilot / lite-gpt</text>

  <rect x="65" y="102" width="1070" height="4" rx="2" fill="url(#accent)" filter="url(#glow)"/>

  <text x="65" y="205" class="mono title">A-TEAM LITE</text>
  <text x="69" y="250" class="mono sub">ONE OWNER · SKILLS ON DEMAND · CROSS-MODEL CRITIQUE</text>

  <text x="69" y="320" class="mono prompt">&gt;</text>
  <text x="101" y="320" class="mono flow">roadmap</text>
  <text x="218" y="320" class="mono flow" fill="#64748b">→</text>
  <text x="254" y="320" class="mono flow">plan</text>
  <text x="324" y="320" class="mono flow" fill="#64748b">→</text>
  <text x="360" y="320" class="mono flow">rubber-duck</text>
  <text x="516" y="320" class="mono flow" fill="#64748b">→</text>
  <text x="552" y="320" class="mono flow">build</text>
  <text x="622" y="320" class="mono flow" fill="#64748b">→</text>
  <text x="658" y="320" class="mono flow">qa</text>
  <text x="700" y="320" class="mono flow" fill="#64748b">→</text>
  <text x="736" y="320" class="mono flow">ship</text>

  <text x="1128" y="365" class="mono sub" font-size="14" text-anchor="end">NO ROLE PIPELINE</text>
</svg>
