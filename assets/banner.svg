    <text x="0" y="152" font-family="Courier New,monospace" font-size="12" fill="#777" text-anchor="middle" letter-spacing="1.5">LYNCH</text>
    <text x="-57" y="-152" font-family="Courier New,monospace" font-size="7" fill="#252525">07</text>
