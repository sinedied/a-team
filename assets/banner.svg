  <!-- 07 LYNCH / QA -->
  <g transform="translate(1125,195)">
    <rect x="-62" y="-165" width="124" height="335" fill="url(#cardGlow)" rx="2"/>
    <rect x="-62" y="-165" width="124" height="335" fill="none" stroke="#191919" stroke-width="1" rx="2"/>
